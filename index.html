<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الكانفاس الصحفية | الإصدار المطور</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300;400;600;700;900&family=Reem+Kufi:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Tailwind Config for Custom Colors/Fonts -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'tajawal': ['Tajawal', 'sans-serif'],
                        'amiri': ['Amiri', 'serif'],
                        'reem': ['Reem Kufi', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            900: '#0a0a0a',
                            800: '#141414',
                            700: '#1f1f1f',
                            600: '#2e2e2e',
                        },
                        gold: {
                            500: '#d4af37',
                            400: '#e6c762',
                            600: '#aa8c2c',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4af37; }

        body {
            background-color: #0a0a0a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.03), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.04), transparent 25%);
            font-family: 'Tajawal', sans-serif;
            color: #e5e5e5;
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Canvas Container Shadows */
        .canvas-shadow {
            box-shadow: 
                0 20px 50px -10px rgba(0,0,0,0.8),
                0 0 0 1px rgba(255,255,255,0.05),
                0 0 40px rgba(212, 175, 55, 0.1);
        }

        /* Inputs & Controls */
        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 50%;
            background: #d4af37;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: #333;
            border-radius: 2px;
        }

        /* Toast Animation */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px) translateX(-50%); }
            to { opacity: 1; transform: translateY(0) translateX(-50%); }
        }
        .toast-enter {
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* Loading Overlay for Canvas */
        .rendering-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .is-rendering .rendering-overlay {
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2"></div>

    <!-- Header -->
    <header class="glass-panel sticky top-0 z-50 border-b border-white/5">
        <div class="max-w-[1920px] mx-auto px-6 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
            
            <!-- Logo & Title -->
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center shadow-[0_0_20px_rgba(212,175,55,0.3)]">
                    <i class="fa-solid fa-scroll text-dark-900 text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-reem text-2xl font-bold text-gold-500 tracking-wide drop-shadow-md">الصحيفة الأثرية</h1>
                    <p class="text-[11px] text-gray-400 font-medium tracking-widest mt-0.5">محرك تصفيف ديناميكي عالي الدقة</p>
                </div>
            </div>

            <!-- Toolbar Actions -->
            <div class="flex items-center gap-3">
                
                <!-- Zoom Controls -->
                <div class="flex items-center bg-dark-800/80 rounded-lg p-1 border border-white/5 shadow-inner">
                    <button onclick="zoom(0.1)" class="w-9 h-9 flex items-center justify-center rounded hover:bg-dark-600 text-gray-300 hover:text-gold-400 transition-colors" title="تكبير">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                    <span id="zoom-level-display" class="text-xs font-mono px-2 text-gray-400 w-12 text-center">65%</span>
                    <button onclick="zoom(-0.1)" class="w-9 h-9 flex items-center justify-center rounded hover:bg-dark-600 text-gray-300 hover:text-gold-400 transition-colors" title="تصغير">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                    <div class="w-px h-5 bg-white/10 mx-1"></div>
                    <button onclick="resetZoom()" class="w-9 h-9 flex items-center justify-center rounded hover:bg-dark-600 text-gray-300 transition-colors" title="استعادة الحجم الأصلي">
                        <i class="fa-solid fa-expand"></i>
                    </button>
                </div>

                <!-- Export Buttons -->
                <button onclick="exportImage()" class="group relative px-5 py-2.5 bg-dark-800 hover:bg-dark-700 text-gray-200 text-sm font-bold rounded-lg border border-white/10 transition-all flex items-center gap-2 overflow-hidden">
                    <div class="absolute inset-0 w-0 bg-gold-600 transition-all duration-[250ms] ease-out group-hover:w-full opacity-10"></div>
                    <i class="fa-solid fa-image text-gold-500 group-hover:scale-110 transition-transform"></i>
                    <span class="relative">تصدير صورة</span>
                </button>
                
                <button onclick="exportPDF()" class="group relative px-5 py-2.5 bg-gradient-to-r from-red-900 to-red-800 hover:from-red-800 hover:to-red-700 text-white text-sm font-bold rounded-lg border border-red-500/30 transition-all shadow-[0_0_15px_rgba(153,27,27,0.4)] flex items-center gap-2">
                    <i class="fa-solid fa-file-pdf group-hover:-translate-y-0.5 transition-transform"></i>
                    <span>حفظ PDF</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex overflow-hidden max-w-[1920px] mx-auto w-full">
        
        <!-- Sidebar Controls -->
        <aside class="w-full md:w-[400px] lg:w-[450px] flex-shrink-0 border-l border-white/5 glass-panel z-40 flex flex-col h-[calc(100vh-81px)]">
            
            <div class="p-4 border-b border-white/5 flex items-center gap-2 text-gold-500">
                <i class="fa-solid fa-sliders"></i>
                <h2 class="font-bold">لوحة التحكم والتنسيق</h2>
            </div>

            <!-- Scrollable Settings -->
            <div class="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar">
                
                <!-- Section 1: Content -->
                <div class="space-y-4">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-pen-nib text-gray-500"></i> المحتوى النصي
                    </h3>
                    
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-1">عنوان الجريدة الرئيسي</label>
                            <input type="text" id="cfg-top-title" class="input-field w-full rounded-lg px-3 py-2 text-sm font-reem text-white" value="مُتابعات ... مِصباح .. (مَقالات صَحفِيَّة)">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] text-gray-400 mb-1">الوسوم / التصنيف</label>
                                <input type="text" id="cfg-category" class="input-field w-full rounded-lg px-3 py-2 text-sm text-white" value="ثَقافَة - أنْسابُ - تاريخ">
                            </div>
                            <div>
                                <label class="block text-[11px] text-gray-400 mb-1">اسم الكاتب</label>
                                <input type="text" id="cfg-author" class="input-field w-full rounded-lg px-3 py-2 text-sm text-white" value="بِقَلَمِ: صالِح بنِ مُحمَّدٍ الأَسْمَرِيّ">
                            </div>
                        </div>

                        <div>
                            <label class="block text-[11px] text-gray-400 mb-1">عنوان المقال (الفرعي)</label>
                            <input type="text" id="cfg-subtitle" class="input-field w-full rounded-lg px-3 py-2 text-sm font-bold text-gold-400" value="لَقَبُ (الْأَسْمَرِيّ) قَبَلِيًّا... مَبْنًى ومَعْنًى">
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="block text-[11px] text-gray-400">متن المقال (يدعم الحواشي &lt;...&gt;)</label>
                                <button onclick="document.getElementById('cfg-body').value=''" class="text-[10px] text-red-400 hover:text-red-300"><i class="fa-solid fa-trash-can"></i> مسح</button>
                            </div>
                            <textarea id="cfg-body" rows="8" class="input-field w-full rounded-lg px-3 py-2.5 text-xs font-mono text-gray-300 leading-relaxed resize-y custom-scrollbar" placeholder="اكتب أو انسخ النص هنا..."></textarea>
                        </div>
                    </div>
                </div>

                <hr class="border-white/5">

                <!-- Section 2: Style & Typography -->
                <div class="space-y-4">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-palette text-gray-500"></i> المظهر والتنسيق
                    </h3>
                    
                    <div class="space-y-4">
                        <!-- Paper Theme -->
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-2">نوع الورق</label>
                            <div class="grid grid-cols-4 gap-2">
                                <button onclick="setTheme('parchment')" id="theme-parchment" class="theme-btn relative overflow-hidden rounded-lg p-2 border-2 border-gold-500 bg-[#f4ecd8] text-dark-900 shadow-lg scale-105 transition-all">
                                    <span class="block text-[10px] font-bold">مخطوطة</span>
                                </button>
                                <button onclick="setTheme('vintage')" id="theme-vintage" class="theme-btn relative overflow-hidden rounded-lg p-2 border border-transparent bg-[#d9c0a3] text-dark-900 opacity-70 hover:opacity-100 hover:scale-105 transition-all">
                                    <span class="block text-[10px] font-bold">عتيق</span>
                                </button>
                                <button onclick="setTheme('classic')" id="theme-classic" class="theme-btn relative overflow-hidden rounded-lg p-2 border border-transparent bg-[#fbfbf9] text-dark-900 opacity-70 hover:opacity-100 hover:scale-105 transition-all">
                                    <span class="block text-[10px] font-bold">كلاسيكي</span>
                                </button>
                                <button onclick="setTheme('royal')" id="theme-royal" class="theme-btn relative overflow-hidden rounded-lg p-2 border border-transparent bg-[#e5d3b3] text-dark-900 opacity-70 hover:opacity-100 hover:scale-105 transition-all shadow-[inset_0_0_10px_rgba(0,0,0,0.2)]">
                                    <span class="block text-[10px] font-bold">ملكي</span>
                                </button>
                            </div>
                        </div>

                        <!-- Typography controls -->
                        <div class="grid grid-cols-2 gap-4 bg-dark-800/50 p-3 rounded-xl border border-white/5">
                            <div>
                                <label class="block text-[11px] text-gray-400 mb-2">نوع خط المتن</label>
                                <select id="cfg-font-family" class="input-field w-full rounded-lg px-2 py-1.5 text-xs text-white">
                                    <option value="Amiri">أميري (تقليدي)</option>
                                    <option value="Tajawal">تجوال (عصري)</option>
                                    <option value="Cairo">كايرو (عريض)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[11px] text-gray-400 mb-2">الأعمدة الصحفية</label>
                                <select id="cfg-columns" class="input-field w-full rounded-lg px-2 py-1.5 text-xs text-white">
                                    <option value="1">عمود واحد (1)</option>
                                    <option value="2">عمودان (2)</option>
                                    <option value="3" selected>ثلاثة أعمدة (3)</option>
                                    <option value="4">أربعة أعمدة (4)</option>
                                </select>
                            </div>
                        </div>

                        <!-- Sliders -->
                        <div class="space-y-4 bg-dark-800/50 p-3 rounded-xl border border-white/5">
                            <div>
                                <div class="flex justify-between mb-1 text-[11px] text-gray-400">
                                    <span>حجم الخط</span>
                                    <span id="lbl-font-size" class="text-gold-400 font-mono">13.5px</span>
                                </div>
                                <input type="range" id="cfg-font-size" min="10" max="22" step="0.5" value="13.5">
                            </div>
                            <div>
                                <div class="flex justify-between mb-1 text-[11px] text-gray-400">
                                    <span>تباعد الأسطر</span>
                                    <span id="lbl-line-height" class="text-gold-400 font-mono">1.6</span>
                                </div>
                                <input type="range" id="cfg-line-height" min="1.2" max="2.5" step="0.1" value="1.6">
                            </div>
                            <div>
                                <div class="flex justify-between mb-1 text-[11px] text-gray-400">
                                    <span>الهوامش</span>
                                    <span id="lbl-margin" class="text-gold-400 font-mono">45px</span>
                                </div>
                                <input type="range" id="cfg-margin" min="20" max="80" step="5" value="45">
                            </div>
                        </div>
                    </div>
                </div>

                <hr class="border-white/5">

                <!-- Section 3: Media -->
                <div class="space-y-4">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-images text-gray-500"></i> الوسائط والصور
                    </h3>
                    
                    <div class="space-y-3">
                        <!-- Author Image -->
                        <div class="bg-dark-800/80 p-3 rounded-xl border border-white/5 flex items-center justify-between gap-3">
                            <div class="flex items-center gap-3">
                                <div id="preview-author" class="w-10 h-10 rounded-full bg-dark-600 border border-gold-500/30 bg-cover bg-center"></div>
                                <div>
                                    <span class="block text-[11px] text-white">صورة الكاتب</span>
                                    <span class="block text-[9px] text-emerald-400">مرفوعة محلياً</span>
                                </div>
                            </div>
                            <input type="file" id="file-author" class="hidden" accept="image/*">
                            <button onclick="document.getElementById('file-author').click()" class="text-xs bg-dark-600 hover:bg-dark-500 text-white px-3 py-1.5 rounded-lg transition-colors border border-white/10">تغيير</button>
                        </div>

                        <!-- Doc Image -->
                        <div class="bg-dark-800/80 p-3 rounded-xl border border-white/5 flex items-center justify-between gap-3">
                            <div class="flex items-center gap-3">
                                <div id="preview-doc" class="w-10 h-12 rounded bg-dark-600 border border-white/10 bg-cover bg-center"></div>
                                <div>
                                    <span class="block text-[11px] text-white">الوثيقة / الشعار</span>
                                    <span class="block text-[9px] text-emerald-400">مرفوعة محلياً</span>
                                </div>
                            </div>
                            <input type="file" id="file-doc" class="hidden" accept="image/*">
                            <button onclick="document.getElementById('file-doc').click()" class="text-xs bg-dark-600 hover:bg-dark-500 text-white px-3 py-1.5 rounded-lg transition-colors border border-white/10">تغيير</button>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Canvas Preview Area -->
        <div class="flex-1 relative bg-dark-900 overflow-hidden flex flex-col">
            
            <!-- Canvas Toolbar overlay -->
            <div class="absolute top-4 left-1/2 -translate-x-1/2 z-30 glass-panel px-4 py-2 rounded-full flex items-center gap-3 pointer-events-none shadow-lg">
                <i class="fa-solid fa-wand-magic-sparkles text-gold-500"></i>
                <span class="text-xs font-medium text-gray-200">عرض حي (Real-time Rendering)</span>
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
            </div>

            <!-- Scrollable Canvas Wrapper -->
            <div id="scroll-container" class="flex-1 overflow-auto w-full h-full custom-scrollbar relative flex items-start justify-center p-10 cursor-grab active:cursor-grabbing">
                
                <!-- Transform wrapper -->
                <div id="zoom-wrapper" class="origin-top transition-transform duration-100 ease-out relative">
                    
                    <!-- The Canvas -->
                    <canvas id="paper-canvas" width="1200" height="1500" class="canvas-shadow bg-white rounded-sm"></canvas>
                    
                    <!-- Loading Overlay -->
                    <div id="render-overlay" class="rendering-overlay rounded-sm">
                        <div class="flex flex-col items-center text-gold-500">
                            <i class="fa-solid fa-circle-notch animate-spin text-3xl mb-2"></i>
                            <span class="text-sm font-bold font-reem">جاري التصفيف...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Script Application -->
    <script>
        /**
         * System Configuration & State
         */
        const state = {
            zoom: 0.65,
            theme: 'parchment',
            isDragging: false,
            dragStartX: 0,
            dragStartY: 0,
            scrollStartX: 0,
            scrollStartY: 0,
            images: {
                author: new Image(),
                doc: new Image()
            },
            renderTimeout: null
        };

        // Paper Themes Palettes
        const THEMES = {
            parchment: { bg: '#f4ecd8', dark: '#e3d2ad', ink: '#231810', sepia: '#8a622a', border: '#42311f', lines: 'rgba(66, 49, 31, 0.15)', noise: 0.04 },
            vintage:   { bg: '#e5d1b8', dark: '#ccae88', ink: '#1c130c', sepia: '#6b451b', border: '#3a2512', lines: 'rgba(58, 37, 18, 0.2)', noise: 0.06 },
            classic:   { bg: '#fbfbf9', dark: '#e5e5e0', ink: '#111111', sepia: '#555555', border: '#222222', lines: 'rgba(0, 0, 0, 0.1)', noise: 0.02 },
            royal:     { bg: '#e8ddc5', dark: '#d4af37', ink: '#1a1610', sepia: '#8c6b22', border: '#8c6b22', lines: 'rgba(140, 107, 34, 0.25)', noise: 0.03 }
        };

        // Default Text
        const defaultText = `🔳 جَاءَ فِي كِتَابِ: "مُعْجَمِ قَبَائِلِ الْمَمْلَكَةِ الْعَرَبِيَّةِ السُّعُودِيَّةِ" (ص/22) لِلْأُسْتَاذِ حَمَدِ الْجَاسِرِ رَحِمَهُ اللَّهُ مَا نَصُّهُ: "بَالْأَسْمَرِ: بَنُو الْأَسْمَرِ، وَيُنْطَقُ الِاسْمُ أَحْيَاناً بِتَشْدِيدِ اللَّامِ: بَلَّسْمَر، وَقَدْ يُكْتَبُ خَطَأً: بَلَّلْسْمَر؛ إِحْدَى قَبَائِلِ الْحَجْرِ، وَالنِّسْبَةُ إِلَيْهَا: أَسْمَرِيٌّ" انْتَهَى.\n\nهَذَا وَ"الْأَسْمَرُ: هُوَ جَدُّ (قَبِيلَةِ بَلَّسْمَر)<وقَد أُطلِق هذا اللَّقَب على غَير هذه القَبيلَة كطائفةٍ ببلادِ المَغرب الأَقصى>؛ وَهُوَ أَسْمَرُ بْنُ حَجْرِ بْنِ الْهِنُوءِ... وَقَدْ سُمِّيَتِ الْبِلَادُ الَّتِي يَسْكُنُهَا بَنُوهُ بِاسْمِهِ.\n\n➖أَوّلُهما: إِطار المَبنَى اللَّفْظِي لـ(بَلَّسْمَر)\n\nإِذ إِنَّ النِّسْبَةَ للْقَبيلَةِ هِي: (بَنُو الْأَسْمَرِ) ؛ لكنَّها قَد أُحِيلَتْ إِلى (بَلَّسْمَر) عَمَلًا بِنَحو قَولِ المُبَرَّد رحمَه اللهُ فِي آخَرينَ<الكامل للمبرد (3/299)>: "كُلُّ اسْمٍ مِنْ أَسْمَاءِ الْقَبَائِلِ تَظْهَرُ فِيهِ لَامُ الْمَعْرِفَةِ، فَإِنَّهُمْ يُجِيزُونَ مَعَهُ حَذْفَ النُّونِ".`;

        /**
         * Initialization
         */
        window.onload = () => {
            // Setup default text
            document.getElementById('cfg-body').value = defaultText;

            // Setup Default Images (Placeholders)
            setupDefaultImage(state.images.author, 'https://placehold.co/400x520/231810/e3d2ad?text=الكاتب', 'preview-author');
            setupDefaultImage(state.images.doc, 'https://placehold.co/400x560/231810/e3d2ad?text=وثيقة', 'preview-doc');

            // Attach Listeners to inputs
            const inputs = document.querySelectorAll('input[type="text"], textarea, select');
            inputs.forEach(input => input.addEventListener('input', scheduleRender));

            const ranges = ['font-size', 'line-height', 'margin'];
            ranges.forEach(id => {
                document.getElementById(`cfg-${id}`).addEventListener('input', (e) => {
                    document.getElementById(`lbl-${id}`).innerText = e.target.value + (id==='line-height'?'':'px');
                    scheduleRender();
                });
            });

            // Image Upload Listeners
            document.getElementById('file-author').addEventListener('change', (e) => handleImageUpload(e, 'author'));
            document.getElementById('file-doc').addEventListener('change', (e) => handleImageUpload(e, 'doc'));

            // Setup Canvas Panning (Drag to scroll)
            setupCanvasPanning();

            // Setup Zoom via Mouse Wheel with Ctrl
            document.getElementById('scroll-container').addEventListener('wheel', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    zoom(e.deltaY > 0 ? -0.05 : 0.05);
                }
            }, { passive: false });

            // Initial Render
            document.fonts.ready.then(() => {
                applyZoom();
                renderCanvas();
                showToast("تم تهيئة بيئة العمل بنجاح", "success");
            });
        };

        function setupDefaultImage(imgObj, src, previewId) {
            imgObj.crossOrigin = "Anonymous"; // Prevent canvas tainting if possible
            imgObj.onload = () => {
                document.getElementById(previewId).style.backgroundImage = `url(${imgObj.src})`;
                scheduleRender();
            };
            imgObj.src = src;
        }

        function handleImageUpload(event, target) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                state.images[target].onload = () => {
                    document.getElementById(`preview-${target}`).style.backgroundImage = `url(${e.target.result})`;
                    showToast("تم تحديث الصورة بنجاح", "success");
                    scheduleRender();
                };
                state.images[target].src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        /**
         * UI Actions
         */
        function setTheme(themeName) {
            state.theme = themeName;
            
            // Reset buttons
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.className = "theme-btn relative overflow-hidden rounded-lg p-2 border border-transparent opacity-70 hover:opacity-100 hover:scale-105 transition-all";
            });
            
            // Set active
            const activeBtn = document.getElementById(`theme-${themeName}`);
            activeBtn.className = "theme-btn relative overflow-hidden rounded-lg p-2 border-2 border-gold-500 scale-105 transition-all shadow-lg";
            activeBtn.classList.add(themeName === 'royal' ? 'shadow-[inset_0_0_10px_rgba(0,0,0,0.2)]' : 'shadow-none');
            
            // Match active bg color from THEMES
            activeBtn.style.backgroundColor = THEMES[themeName].bg;
            document.querySelectorAll('.theme-btn:not(#theme-'+themeName+')').forEach(b => {
                b.style.backgroundColor = THEMES[b.id.split('-')[1]].bg;
            });

            scheduleRender();
        }

        function zoom(delta) {
            state.zoom += delta;
            state.zoom = Math.max(0.2, Math.min(state.zoom, 2.0)); // Clamp between 20% and 200%
            applyZoom();
        }

        function resetZoom() {
            state.zoom = 0.65;
            applyZoom();
        }

        function applyZoom() {
            document.getElementById('zoom-wrapper').style.transform = `scale(${state.zoom})`;
            document.getElementById('zoom-level-display').innerText = Math.round(state.zoom * 100) + '%';
        }

        function setupCanvasPanning() {
            const container = document.getElementById('scroll-container');
            
            container.addEventListener('mousedown', (e) => {
                // Only pan if clicking on the background, not specifically the canvas itself if we had interaction inside
                state.isDragging = true;
                state.dragStartX = e.pageX;
                state.dragStartY = e.pageY;
                state.scrollStartX = container.scrollLeft;
                state.scrollStartY = container.scrollTop;
            });

            window.addEventListener('mousemove', (e) => {
                if (!state.isDragging) return;
                e.preventDefault();
                const x = e.pageX - state.dragStartX;
                const y = e.pageY - state.dragStartY;
                container.scrollLeft = state.scrollStartX - x;
                container.scrollTop = state.scrollStartY - y;
            });

            window.addEventListener('mouseup', () => {
                state.isDragging = false;
            });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const icon = type === 'success' ? '<i class="fa-solid fa-check-circle text-emerald-400"></i>' : 
                         type === 'error' ? '<i class="fa-solid fa-triangle-exclamation text-red-400"></i>' :
                         '<i class="fa-solid fa-info-circle text-gold-400"></i>';
            
            toast.className = `toast-enter flex items-center gap-3 px-4 py-3 rounded-lg shadow-2xl border border-white/10 bg-dark-800 text-white text-sm`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px) translateX(-50%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        /**
         * Core Rendering Engine
         */
        function scheduleRender() {
            if(state.renderTimeout) clearTimeout(state.renderTimeout);
            document.getElementById('zoom-wrapper').classList.add('is-rendering');
            
            state.renderTimeout = setTimeout(() => {
                renderCanvas();
                document.getElementById('zoom-wrapper').classList.remove('is-rendering');
            }, 300); // Debounce to prevent lag
        }

        function renderCanvas(scaleMultiplier = 1) {
            const canvas = document.getElementById('paper-canvas');
            const ctx = canvas.getContext('2d');
            
            // 1. Get Config
            const logicalWidth = 1200; // Fixed internal logical width
            const config = {
                title: document.getElementById('cfg-top-title').value || 'بدون عنوان',
                category: document.getElementById('cfg-category').value,
                author: document.getElementById('cfg-author').value,
                subtitle: document.getElementById('cfg-subtitle').value,
                body: document.getElementById('cfg-body').value,
                fontFamily: document.getElementById('cfg-font-family').value,
                fontSize: parseFloat(document.getElementById('cfg-font-size').value),
                lineHeight: parseFloat(document.getElementById('cfg-line-height').value),
                columns: parseInt(document.getElementById('cfg-columns').value),
                margin: parseInt(document.getElementById('cfg-margin').value),
                width: logicalWidth 
            };
            const theme = THEMES[state.theme];

            // 2. Parse Footnotes & Clean Text
            let { cleanedText, footnotes } = parseFootnotes(config.body);

            // 3. Layout Calculation Phase
            // We need to calculate height BEFORE drawing background
            const colGap = 35;
            const usableWidth = config.width - (config.margin * 2);
            const colWidth = (usableWidth - ((config.columns - 1) * colGap)) / config.columns;
            
            ctx.textBaseline = 'top'; // Easier math

            // Build layout items
            let items = calculateTextFlow(ctx, cleanedText, colWidth, config.fontSize, config.fontFamily, config.lineHeight);
            
            // Calculate Heights
            const headerHeight = 450;
            let totalTextHeight = items.reduce((sum, item) => sum + item.height, 0);
            const contentHeightPerColumn = Math.ceil(totalTextHeight / config.columns) + 50; // Add padding
            
            // Footnotes Height
            let footnotesHeight = 0;
            if(footnotes.length > 0) {
                ctx.font = `12px 'Tajawal', sans-serif`;
                footnotesHeight += 60; // Title
                footnotes.forEach(fn => {
                    const lines = wrapText(ctx, `${fn.num}. ${fn.text}`, usableWidth);
                    footnotesHeight += lines.length * 20 + 5;
                });
            }

            // Set final Canvas Height dynamically
            const logicalHeight = headerHeight + contentHeightPerColumn + footnotesHeight + 100;
            
            // Apply High-Res Scaling for Export
            canvas.width = logicalWidth * scaleMultiplier;
            canvas.height = logicalHeight * scaleMultiplier;
            ctx.scale(scaleMultiplier, scaleMultiplier);

            // 4. Drawing Phase (Using Logical Dimensions)
            
            // Background
            drawPaperBackground(ctx, logicalWidth, logicalHeight, theme);
            
            // Frame
            drawBorders(ctx, logicalWidth, logicalHeight, theme);
            
            // Header (Ribbons, Titles)
            drawHeader(ctx, config, theme, headerHeight);
            
            // Images
            drawImages(ctx, config, theme);

            // Columns (Text)
            drawColumns(ctx, items, config, theme, headerHeight, colWidth, colGap, contentHeightPerColumn);

            // Footnotes
            if(footnotes.length > 0) {
                drawFootnotesSection(ctx, footnotes, config, theme, headerHeight + contentHeightPerColumn, usableWidth);
            }

            // Footer
            drawFooter(ctx, config.margin, logicalHeight, theme, logicalWidth);
        }

        /**
         * Drawing Sub-routines
         */
        function parseFootnotes(rawText) {
            let cleanedText = '';
            let footnotes = [];
            let fnCount = 1;
            let lastIdx = 0;
            const regex = /<([^>]+)>/g;
            let match;

            while ((match = regex.exec(rawText)) !== null) {
                cleanedText += rawText.substring(lastIdx, match.index);
                cleanedText += ` [${fnCount}]`;
                footnotes.push({ num: fnCount, text: match[1].trim() });
                fnCount++;
                lastIdx = regex.lastIndex;
            }
            cleanedText += rawText.substring(lastIdx);
            return { cleanedText, footnotes };
        }

        function calculateTextFlow(ctx, text, maxWidth, fontSize, fontFamily, lineMult) {
            const rawParas = text.split('\n');
            let flowItems = [];
            
            rawParas.forEach(para => {
                const trimmed = para.trim();
                if (trimmed === '') {
                    flowItems.push({ type: 'gap', height: fontSize * 0.5 });
                    return;
                }
                
                const isHeading = trimmed.startsWith('➖') || trimmed.startsWith('🔳') || trimmed.startsWith('🛑');
                const fSize = isHeading ? fontSize * 1.15 : fontSize;
                const fWeight = isHeading ? 'bold' : 'normal';
                
                ctx.font = `${fWeight} ${fSize}px '${fontFamily}', serif`;
                const lines = wrapText(ctx, trimmed, maxWidth);
                
                if (isHeading) flowItems.push({ type: 'gap', height: fontSize });
                
                lines.forEach(l => {
                    flowItems.push({ 
                        type: 'line', 
                        text: l, 
                        font: ctx.font, 
                        height: fSize * lineMult,
                        isHeading
                    });
                });
                
                flowItems.push({ type: 'gap', height: fontSize * 0.8 }); // Paragraph spacing
            });
            return flowItems;
        }

        function wrapText(ctx, text, maxWidth) {
            // Enhanced wrap logic for Arabic
            const words = text.split(/(\s+)/); // keep spaces to preserve structure if needed, but let's do normal split
            const cleanWords = text.split(/\s+/);
            let lines = [];
            let currentLine = '';

            for (let i = 0; i < cleanWords.length; i++) {
                let testLine = currentLine ? currentLine + ' ' + cleanWords[i] : cleanWords[i];
                let metrics = ctx.measureText(testLine);
                
                if (metrics.width > maxWidth && currentLine !== '') {
                    lines.push(currentLine);
                    currentLine = cleanWords[i];
                } else {
                    currentLine = testLine;
                }
            }
            if (currentLine) lines.push(currentLine);
            return lines;
        }

        function drawPaperBackground(ctx, w, h, theme) {
            ctx.fillStyle = theme.bg;
            ctx.fillRect(0, 0, w, h);

            // Add simulated noise/texture
            ctx.fillStyle = theme.dark;
            for(let i=0; i< (w*h*theme.noise)/100; i++) {
                let x = Math.random() * w;
                let y = Math.random() * h;
                let s = Math.random() * 1.5;
                ctx.globalAlpha = Math.random() * 0.5;
                ctx.fillRect(x, y, s, s);
            }
            ctx.globalAlpha = 1.0;

            // Vignette edges
            let grad = ctx.createRadialGradient(w/2, h/2, w/3, w/2, h/2, w);
            grad.addColorStop(0, 'rgba(255,255,255,0)');
            grad.addColorStop(1, 'rgba(0,0,0,0.15)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
        }

        function drawBorders(ctx, w, h, theme) {
            ctx.strokeStyle = theme.border;
            
            // Outer thick
            ctx.lineWidth = 3;
            ctx.strokeRect(12, 12, w - 24, h - 24);
            
            // Inner thin
            ctx.lineWidth = 1;
            ctx.strokeRect(18, 18, w - 36, h - 36);
            
            // Corner flourishes
            const m = 18;
            const L = 30; // length of flourish
            ctx.lineWidth = 2;
            
            // Top Left
            ctx.beginPath(); ctx.moveTo(m, m+L); ctx.quadraticCurveTo(m, m, m+L, m); ctx.stroke();
            // Top Right
            ctx.beginPath(); ctx.moveTo(w-m, m+L); ctx.quadraticCurveTo(w-m, m, w-m-L, m); ctx.stroke();
            // Bottom Right
            ctx.beginPath(); ctx.moveTo(w-m, h-m-L); ctx.quadraticCurveTo(w-m, h-m, w-m-L, h-m); ctx.stroke();
            // Bottom Left
            ctx.beginPath(); ctx.moveTo(m, h-m-L); ctx.quadraticCurveTo(m, h-m, m+L, h-m); ctx.stroke();
        }

        function drawHeader(ctx, cfg, theme, hHeight) {
            const cx = cfg.width / 2;
            ctx.textAlign = 'center';
            ctx.fillStyle = theme.ink;
            ctx.textBaseline = 'top';

            // Top small text
            ctx.font = `italic 15px 'Amiri', serif`;
            ctx.fillText('العدد الممتاز - منبر الفكر واللغة والأثر', cx, 40);
            
            ctx.font = `bold 22px 'Amiri', serif`;
            ctx.fillText('﷽', cx, 65);

            // Lines
            ctx.strokeStyle = theme.ink;
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(cfg.margin, 100); ctx.lineTo(cfg.width - cfg.margin, 100); ctx.stroke();
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cfg.margin, 107); ctx.lineTo(cfg.width - cfg.margin, 107); ctx.stroke();

            // Broad Ribbon
            const ribbonY = 125;
            const ribbonH = 75;
            const ribbonW = 750;
            const rX = cx - (ribbonW/2);

            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 4;
            
            // Create nice gradient ribbon
            let goldGrad = ctx.createLinearGradient(rX, ribbonY, rX + ribbonW, ribbonY);
            goldGrad.addColorStop(0, theme.bg);
            goldGrad.addColorStop(0.2, theme.dark);
            goldGrad.addColorStop(0.5, theme.bg);
            goldGrad.addColorStop(0.8, theme.dark);
            goldGrad.addColorStop(1, theme.bg);

            ctx.fillStyle = goldGrad;
            ctx.strokeStyle = theme.border;
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.moveTo(rX, ribbonY + 10);
            ctx.quadraticCurveTo(cx, ribbonY - 5, rX + ribbonW, ribbonY + 10);
            ctx.lineTo(rX + ribbonW, ribbonY + ribbonH - 10);
            ctx.quadraticCurveTo(cx, ribbonY + ribbonH + 5, rX, ribbonY + ribbonH - 10);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            ctx.restore();

            // Ribbon Text
            ctx.fillStyle = theme.ink;
            ctx.font = `bold 32px 'Reem Kufi', sans-serif`;
            // vertically center text in ribbon
            ctx.fillText(cfg.title, cx, ribbonY + (ribbonH/2) - 18);

            // Categories
            ctx.font = `bold 18px 'Tajawal', sans-serif`;
            ctx.fillText(`⟪ ${cfg.category} ⟫`, cx, 235);

            // Subtitle
            ctx.font = `bold 26px 'Reem Kufi', sans-serif`;
            ctx.fillText(cfg.subtitle, cx, 280);

            // Author Byline
            ctx.fillStyle = theme.sepia;
            ctx.font = `bold 17px 'Tajawal', sans-serif`;
            ctx.fillText(cfg.author, cx, 320);

            // Divider Lines
            ctx.strokeStyle = theme.ink;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cfg.margin, 355); ctx.lineTo(cfg.width - cfg.margin, 355); ctx.stroke();
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(cfg.margin, 362); ctx.lineTo(cfg.width - cfg.margin, 362); ctx.stroke();
        }

        function drawImages(ctx, cfg, theme) {
            // Author Portrait (Right side)
            const aX = cfg.width - cfg.margin - 90;
            const aY = 240;
            const rX = 65, rY = 85;

            ctx.save();
            // Ornate Oval Frame
            ctx.beginPath();
            ctx.ellipse(aX, aY, rX, rY, 0, 0, Math.PI*2);
            ctx.strokeStyle = theme.theme === 'royal' ? '#b59336' : theme.sepia;
            ctx.lineWidth = 6;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 15;
            ctx.stroke();

            // Inner clip
            ctx.beginPath();
            ctx.ellipse(aX, aY, rX - 2, rY - 2, 0, 0, Math.PI*2);
            ctx.clip();
            if(state.images.author.src) {
                // drawImage(img, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)
                // Fit image nicely
                ctx.drawImage(state.images.author, aX - rX, aY - rY, rX*2, rY*2);
            }
            ctx.restore();

            // Document Image (Left side)
            const docW = 130, docH = 180;
            const dX = cfg.margin + 20;
            const dY = 145;

            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            
            ctx.fillStyle = '#fff';
            ctx.fillRect(dX, dY, docW, docH);
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 1;
            ctx.strokeRect(dX, dY, docW, docH);

            if(state.images.doc.src) {
                ctx.drawImage(state.images.doc, dX + 5, dY + 5, docW - 10, docH - 10);
            }
            ctx.restore();

            // Doc Caption
            ctx.fillStyle = theme.sepia;
            ctx.font = `11px 'Tajawal', sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('مرفق مرجعي', dX + (docW/2), dY + docH + 15);
        }

        function drawColumns(ctx, items, cfg, theme, startY, colWidth, colGap, maxColHeight) {
            let currentColumn = 0;
            let currentX = cfg.margin;
            let currentY = startY;

            ctx.textAlign = 'right';
            ctx.fillStyle = theme.ink;

            items.forEach(item => {
                if (item.type === 'gap') {
                    currentY += item.height;
                    return;
                }

                // Check overflow
                if (currentY + item.height > startY + maxColHeight) {
                    currentColumn++;
                    if (currentColumn < cfg.columns) {
                        currentX = cfg.margin + (currentColumn * (colWidth + colGap));
                        currentY = startY;
                    } else {
                        // Max columns reached (safety boundary)
                        currentY = startY; 
                    }
                }

                const rightBound = currentX + colWidth;

                // Draw column divider if needed
                if (currentColumn > 0 && currentY === startY) {
                    ctx.save();
                    ctx.strokeStyle = theme.lines;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(currentX - (colGap/2), startY);
                    ctx.lineTo(currentX - (colGap/2), startY + maxColHeight);
                    ctx.stroke();
                    ctx.restore();
                }

                ctx.font = item.font;
                ctx.fillText(item.text, rightBound, currentY);
                currentY += item.height;
            });
        }

        function drawFootnotesSection(ctx, footnotes, cfg, theme, startY, usableWidth) {
            const m = cfg.margin;
            
            ctx.save();
            ctx.strokeStyle = theme.border;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(m, startY); ctx.lineTo(cfg.width - m, startY); ctx.stroke();
            ctx.restore();

            ctx.fillStyle = theme.sepia;
            ctx.textAlign = 'right';
            ctx.font = `bold 16px 'Reem Kufi', sans-serif`;
            ctx.fillText('هوامش وتخريجات معتمدة:', cfg.width - m, startY + 20);

            ctx.fillStyle = theme.ink;
            ctx.font = `13px 'Tajawal', sans-serif`;
            
            let fnY = startY + 50;
            footnotes.forEach(fn => {
                const lines = wrapText(ctx, `${fn.num}. ${fn.text}`, usableWidth);
                lines.forEach(line => {
                    ctx.fillText(line, cfg.width - m, fnY);
                    fnY += 20; // fixed line height for footnotes
                });
                fnY += 5; // Gap between notes
            });
        }

        function drawFooter(ctx, margin, canvasH, theme, canvasW) {
            const footerY = canvasH - 35;
            
            ctx.fillStyle = theme.sepia;
            ctx.font = `12px 'Tajawal', sans-serif`;
            
            ctx.textAlign = 'right';
            ctx.fillText('أُرشِف وصُفَّت حروفه رقمياً ©', canvasW - margin, footerY);

            ctx.textAlign = 'left';
            ctx.fillText('منصة الكانفاس الأثرية', margin, footerY);

            ctx.textAlign = 'center';
            ctx.font = `bold 18px 'Amiri', serif`;
            ctx.fillText('❧ ❦ ☙', canvasW / 2, footerY - 4);
        }

        /**
         * Export Features
         */
        function exportImage() {
            showToast("جاري تجهيز الصورة عالية الدقة...", "info");
            setTimeout(() => {
                // مضاعفة الدقة 3 مرات للصورة
                renderCanvas(3);

                const canvas = document.getElementById('paper-canvas');
                const imgData = canvas.toDataURL('image/jpeg', 0.98);
                const link = document.createElement('a');
                link.download = `وثيقة_صحفية_${Date.now()}.jpg`;
                link.href = imgData;
                link.click();

                // استعادة حجم الشاشة الطبيعي
                renderCanvas(1);
                showToast("تم الحفظ بنجاح!", "success");
            }, 100);
        }

        function exportPDF() {
            showToast("جاري توليد ملف الـ PDF (بدقة طباعة فائقة)...", "info");
            setTimeout(() => {
                try {
                    // مضاعفة الدقة 4 مرات للـ PDF لضمان حدة النص عند التكبير
                    renderCanvas(4);

                    const { jsPDF } = window.jspdf;
                    const canvas = document.getElementById('paper-canvas');
                    
                    const cw = canvas.width;
                    const ch = canvas.height;
                    
                    // A4 Width is 210mm
                    const pdfW = 210;
                    const pdfH = (ch * pdfW) / cw;
                    
                    const doc = new jsPDF({
                        orientation: pdfH > pdfW ? 'portrait' : 'landscape',
                        unit: 'mm',
                        format: [pdfW, pdfH]
                    });

                    // استخدام جودة عالية جداً للـ JPEG لتفادي التشويش
                    const imgData = canvas.toDataURL('image/jpeg', 0.98);
                    doc.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
                    doc.save(`صحيفة_مؤرشفة_${Date.now()}.pdf`);
                    
                    // استعادة حجم الشاشة الطبيعي
                    renderCanvas(1);
                    showToast("تم حفظ الـ PDF بنجاح!", "success");
                } catch (error) {
                    console.error(error);
                    renderCanvas(1); // استعادة الكانفاس في حال حدوث خطأ
                    showToast("حدث خطأ أثناء تصدير الـ PDF. تأكد من اتصالك بالإنترنت.", "error");
                }
            }, 100);
        }
    </script>
</body>
